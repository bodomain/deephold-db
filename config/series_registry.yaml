    license: "Yahoo ToS — privater Gebrauch"
    url: "https://finance.yahoo.com/quote/MSFT"
    first_date: "1986-03-13"
    last_date: "present"
    frequency: "D"
    unit: "USD"
    asset_class: "equity"
