# Paper universe for AEGIS replication (Chakraborty & Singh 2026).
#
# Hand-picked subset of S&P 500 + 5 benchmark indices. The paper uses the
# full ~500/400/600/100/30 = ~1500+ tickers aggregated from Wikipedia;
# this is a tractable subset for end-to-end replication in our stack.
#
# Sectors chosen to span the GICS landscape:
#   Tech, Finance, Healthcare, Consumer, Energy, Industrial, Materials,
#   Utilities, Real Estate, Communication.

equities:
  - {symbol: AAPL,  name: "Apple Inc.",                      sector: Tech}
  - {symbol: MSFT,  name: "Microsoft Corp.",                 sector: Tech}
  - {symbol: GOOGL, name: "Alphabet Inc. Class A",            sector: Tech}
  - {symbol: META,  name: "Meta Platforms Inc.",             sector: Tech}
  - {symbol: NVDA,  name: "NVIDIA Corp.",                    sector: Tech}
  - {symbol: AMD,   name: "Advanced Micro Devices",          sector: Tech}
  - {symbol: ORCL,  name: "Oracle Corp.",                    sector: Tech}
  - {symbol: CSCO,  name: "Cisco Systems Inc.",              sector: Tech}
  - {symbol: JPM,   name: "JPMorgan Chase & Co.",            sector: Finance}
  - {symbol: BAC,   name: "Bank of America Corp.",           sector: Finance}
  - {symbol: GS,    name: "Goldman Sachs Group",             sector: Finance}
  - {symbol: MS,    name: "Morgan Stanley",                  sector: Finance}
  - {symbol: BLK,   name: "BlackRock Inc.",                  sector: Finance}
  - {symbol: JNJ,   name: "Johnson & Johnson",              sector: Healthcare}
  - {symbol: UNH,   name: "UnitedHealth Group",              sector: Healthcare}
  - {symbol: PFE,   name: "Pfizer Inc.",                     sector: Healthcare}
  - {symbol: LLY,   name: "Eli Lilly and Co.",               sector: Healthcare}
  - {symbol: MRK,   name: "Merck & Co. Inc.",                sector: Healthcare}
  - {symbol: KO,    name: "The Coca-Cola Co.",               sector: Consumer}
  - {symbol: PEP,   name: "PepsiCo Inc.",                    sector: Consumer}
  - {symbol: PG,    name: "Procter & Gamble Co.",            sector: Consumer}
  - {symbol: WMT,   name: "Walmart Inc.",                    sector: Consumer}
  - {symbol: MCD,   name: "McDonald's Corp.",                sector: Consumer}
  - {symbol: HD,    name: "The Home Depot Inc.",             sector: Consumer}
  - {symbol: NKE,   name: "Nike Inc.",                       sector: Consumer}
  - {symbol: XOM,   name: "Exxon Mobil Corp.",               sector: Energy}
  - {symbol: CVX,   name: "Chevron Corp.",                   sector: Energy}
  - {symbol: BA,    name: "The Boeing Co.",                 sector: Industrial}
  - {symbol: CAT,   name: "Caterpillar Inc.",                sector: Industrial}
  - {symbol: GE,    name: "GE Aerospace",                   sector: Industrial}
  - {symbol: LIN,   name: "Linde plc",                       sector: Materials}

# Benchmarks (per the paper's multi-benchmark comparison).
# S&P 400 and S&P 600 are not direct Yahoo tickers, so we use their
# iShares ETF proxies (IJH tracks S&P 400, IJR tracks S&P 600).
benchmarks:
  - {symbol: ^GSPC, name: "S&P 500 Index",                   is_investable: false}
  - {symbol: ^IXIC, name: "NASDAQ Composite Index",          is_investable: false}
  - {symbol: ^DJI,  name: "Dow Jones Industrial Average",    is_investable: false}
  - {symbol: IJH,   name: "iShares Core S&P Mid-Cap (S&P 400 proxy)",  is_investable: true}
  - {symbol: IJR,   name: "iShares Core S&P Small-Cap (S&P 600 proxy)", is_investable: true}
